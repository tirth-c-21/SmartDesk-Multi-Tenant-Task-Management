name: SmartDesk CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout code
      - name: Checkout code
        uses: actions/checkout@v4        # ← v3 to v4

      # Step 2 — Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4      # ← v3 to v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 — Build JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 4 — Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3     # ← v2 to v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5 — Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6  # ← v4 to v6
        with:
          context: .
          push: true
          tags: tirth2104/smartdesk:latest

      # Step 6 — Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/smartdesk
            docker compose pull
            docker compose up -d